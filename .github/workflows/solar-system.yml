name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_USERNAME: superuser
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
jobs:
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        container:
          image: node:20
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        # - name: Setup NodeJS Version
        #   uses: actions/setup-node@v4
        #   with:
        #     node-version: 20

        - name: Cache NPM dependencies
          uses: actions/cache@v5.0.5
          with:
            path: node_modules
            key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          run: npm test
          
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result
            path: test-results.xml
            
    Code-coverage:
        name: Code coverage
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version
          uses: actions/setup-node@v4
          with:
            node-version: 18

        - name: Cache NPM dependencies
          uses: actions/cache@v5.0.5
          with:
            path: node_modules
            key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
    
        - name: Install Dependencies
          run: npm install
          
        - name: code-coverage
          continue-on-error: true
          run: |
            npm run coverage

        - name: Archive Coverage Result
          uses: actions/upload-artifact@v4
          with:
            name: Code-Coverage-Result
            path: coverage
            retention-days: 5

    docker:
        name: Docker
        needs: [ unit-testing, Code-coverage ]
        permissions:
          packages: write
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: ghcr login
          uses: docker/login-action@v4.1.0
          with:
            registry: ghcr.io
            username: mohammadabdelaty
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: build and push
          uses: docker/build-push-action@v7.1.0
          with:
            context: .
            push: true
            tags: ghcr.io/mohammadabdelaty/solar-system:${{ github.sha }} 
    
    dev-deploy:
      name: dev-deploy
      runs-on: ubuntu-latest
      needs: docker
      environment:
        name: development 
      steps:
        - name: install cluster
          uses: helm/kind-action@v1.14.0
        - name: deploy
          run: |
            sleep 60
            kubectl -n kube-system get pod
            set +e
            REPO_OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
            kubectl run solar --image ghcr.io/${REPO_OWNER_LC}/solar-system:${{ github.sha }} \
               --env MONGO_URI=${{ env.MONGO_URI}} \
               --env MONGO_USERNAME=${{ env.MONGO_USERNAME}} \
               --env MONGO_PASSWORD=${{ env.MONGO_PASSWORD}}
            set -e
            echo "kubectl returned $?"
            kubectl -n default get pod
            sleep 10
    integration-testing:
      name: integration-testing
      runs-on: ubuntu-latest
      needs: dev-deploy
      # environment:
      #   name: development 
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
          
        - name: integrations
          uses: ./.github/workflows/reusable-workflow.yml
          with:
            ingress-url: ${{ needs.dev-deploy.outputs.APP_INGRESS_URL }}
