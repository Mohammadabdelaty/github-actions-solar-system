name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_USERNAME: superuser
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
jobs:
    dev-deploy:
      name: dev-deploy
      runs-on: ubuntu-latest
      # needs: docker
      outputs:
        url: ${{ steps.ingress.outputs.INGRESS_HOST }}
      environment:
        name: development 
      steps:
        - name: install cluster
          uses: helm/kind-action@v1.14.0

        - name: install ingress
          run: |
            helm upgrade --install ingress-nginx ingress-nginx \
            --repo https://kubernetes.github.io/ingress-nginx \
            --namespace ingress-nginx --create-namespace
            sleep 10s
            kubectl get svc -n ingress-nginx

        - name: ingress
          run: |
            INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            echo "INGRESS_IP=${INGRESS_IP}" >> $GITHUB_ENV
      
        - name: checkout
          uses: actions/checkout@v6.0.2
      
        - name: replace-vars
          uses: cschleiden/replace-tokens@v1.3
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["${{ vars.KUBE_DIR }}/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAMESPACE }}
            IMAGE: ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}
            REPLICAS: ${{ vars.REPLICAS }} 
            INGRESS_IP: ${{ env.INGRESS_IP }}

        - name: mongo-secret
          run: |
            kubectl create secret generic mongo-db-creds --from-literal=MONGO_URI=${{ env.MONGO_URI }} --from-literal=MONGO_USERNAME=${{ env.MONGO_USERNAME }} --from-literal=MONGO_PASSWORD=${{ env.MONGO_PASSWORD }} --save-config --dry-run=client -o yaml | kubectl apply -f -    
        - name: deploy
          id: ingress
          run: |
            ls -l
            kubectl apply -f ${{ vars.KUBE_DIR }}
            sleep 5s
            echo "INGRESS_HOST=$(kubectl get ingress solar-system -n ${{ vars.NAMESPACE }} -o jsonpath='{.spec.rules[*].host}')" >> $GITHUB_OUTPUT
# dev-deploy job
    integration-test:
          needs: dev-deploy
          uses: ./.github/workflows/reusable-workflow.yml
          with:
            ingress-url: ${{ needs.dev-deploy.outputs.url }}
# next job
