name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
env:
  MONGO_USERNAME: superuser
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
jobs:
    dev-deploy:
      name: dev-deploy
      runs-on: ubuntu-latest
      # needs: docker
      # outputs:
      #   url: ${{ steps.ingress.outputs.INGRESS_IP }}
      environment:
        name: development 
      steps:
        - name: install cluster
          uses: helm/kind-action@v1.14.0

        - name: install ingress
          run: |
            helm upgrade --install ingress-nginx ingress-nginx \
            --repo https://kubernetes.github.io/ingress-nginx \
            --namespace ingress-nginx --create-namespace
            sleep 10s
            kubectl get svc -n ingress-nginx

        - name: ingress
          id: ingress
          run: |
            echo "INGRESS_IP=$(kubectl get svc ingress-nginx-controller  -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')" >> "$GITHUB_ENV
        
        - name: checkout
          uses: actions/checkout@v6.0.2

        - name: replace-vars
          uses: cschleiden/replace-tokens@v1.3
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["${{ vars.KUBE_DIR }}/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAEMASPCE }}
            IMAGE: ghcr.io/${REPO_OWNER_LC}/solar-system:${{ github.sha }}
            REPLICAS: ${{ vars.REPLICAS }} 
            INGRESS_IP: ${{ env.INGRESS_IP }}

        - name: mongo-secret
          run: |
            kubectl run -n ${{ vars.NAMESPACE }} create secret generic mongodb-creds \
            --from-literal=MONGO_URI=${{ env.MONGO_URI }} \
            --from-literal=MONGO_USERNAME=${{ vars.MONGO_USERNAME }} \
            --from-literal=MONGO_PASSWORD=${{ vars.MONGO_PASSWORD }} \
            --save-config \ 
            --dry-run=client \ -o yaml | kubectl apply -f -
            
        - name: deploy
          run: |
            kubectl apply -f ${{ vars.KUBE_DIR }}
